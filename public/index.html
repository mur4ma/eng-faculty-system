<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ระบบคณะวิศวกรรมศาสตร์และเทคโนโลยี</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="login-page" class="hidden">
  <div class="login-card">
    <div class="login-logo">⚙️</div>
    <h1>คณะวิศวกรรมศาสตร์และเทคโนโลยี</h1>
    <p class="muted">ระบบสารสนเทศนักศึกษาและบุคลากร</p>
    <input id="login-code" placeholder="รหัสนักศึกษา / รหัสพนักงาน" autocomplete="username">
    <input id="login-pass" type="password" placeholder="รหัสผ่าน" autocomplete="current-password">
    <button class="btn-primary btn-block" onclick="doLogin()">เข้าสู่ระบบ</button>
    <p id="login-error" class="error"></p>
  </div>
</div>

<div id="app" class="hidden">
  <header>
    <div class="brand">⚙️ คณะวิศวกรรมศาสตร์ฯ</div>
    <div class="header-right">
      <button class="bell" onclick="toggleNotif()">🔔<span id="notif-badge" class="badge hidden"></span></button>
      <span id="user-info"></span>
      <button class="btn-sm" onclick="doLogout()">ออกจากระบบ</button>
    </div>
  </header>
  <div id="notif-panel" class="notif-panel hidden"></div>
  <nav id="nav"></nav>
  <main id="main"></main>
</div>

<div id="modal-wrap" class="modal-wrap hidden" onclick="if(event.target===this)closeModal()">
  <div id="modal" class="modal"></div>
</div>
<div id="toast" class="toast hidden"></div>

<script src="app.js"></script>
</body>
</html>
